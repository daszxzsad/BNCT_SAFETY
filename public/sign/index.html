<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BNCT 전자결재 시스템</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#003087;--navy2:#1a3a6b;--blue:#1565c0;--blue2:#0d47a1;
  --green:#2e7d32;--red:#c62828;--amber:#f57c00;
  --bg:#eef2f7;--white:#fff;
  --gray1:#f5f7fa;--gray2:#e8edf5;--gray3:#d1dae8;--gray4:#9aa8bc;--gray7:#3d4f6a;
  --text:#1a2332;--shadow:0 2px 16px rgba(0,30,87,.10);--radius:10px;
}
html,body{font-family:'Noto Sans KR',Arial,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.hdr{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 60%,var(--blue) 100%);color:#fff;position:sticky;top:0;z-index:200;box-shadow:0 3px 20px rgba(0,30,87,.35);}
.hdr-inner{display:flex;align-items:center;justify-content:space-between;padding:13px 28px;max-width:1100px;margin:0 auto;}
.hdr-logo{font-size:20px;font-weight:900;letter-spacing:3px;}
.hdr-sub{font-size:11px;opacity:.65;margin-top:2px;}
.hdr-badge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:700;white-space:nowrap;}
.hdr-badge.done{background:rgba(46,125,50,.6);}
.infobar{background:var(--white);border-bottom:2px solid var(--gray2);padding:11px 28px;display:flex;gap:28px;flex-wrap:wrap;font-size:13px;}
.infobar strong{color:var(--navy);font-weight:700;}
.stepwrap{max-width:1100px;margin:20px auto 0;padding:0 20px;}
.stepbar{display:flex;border-radius:var(--radius);overflow:hidden;border:1px solid var(--gray3);background:var(--white);box-shadow:var(--shadow);}
.step{flex:1;padding:11px 6px;text-align:center;font-size:11px;font-weight:700;background:var(--gray1);color:var(--gray4);border-right:1px solid var(--gray3);transition:all .2s;line-height:1.4;}
.step:last-child{border-right:none;}
.step.done{background:#e3f2fd;color:var(--blue);}
.step.active{background:var(--navy);color:#fff;}
.step-num{display:inline-block;width:20px;height:20px;border-radius:50%;background:var(--gray3);font-size:11px;line-height:20px;margin-bottom:3px;font-weight:900;}
.step.done .step-num{background:var(--blue);color:#fff;}
.step.active .step-num{background:rgba(255,255,255,.3);color:#fff;}
.wrap{max-width:1100px;margin:20px auto 100px;padding:0 20px;}
.card{background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);margin-bottom:14px;overflow:visible;box-shadow:var(--shadow);}
.card-hdr{padding:12px 20px;font-size:13px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px;border-radius:var(--radius) var(--radius) 0 0;}
.card-hdr.pledge{background:linear-gradient(90deg,#37474f,#546e7a);}
.card-hdr.permit1,.card-hdr.permit2{background:linear-gradient(90deg,var(--navy2),var(--navy));}
.card-hdr.extra{background:linear-gradient(90deg,var(--green),#388e3c);}
.card-body{padding:18px 20px;overflow:visible;}
.badge{background:rgba(255,255,255,.22);padding:2px 9px;border-radius:12px;font-size:10px;}
.badge.edit{background:#ffd740;color:#333;font-weight:800;}
.badge.done-mark{background:rgba(255,255,255,.3);}
.badge.wait{background:rgba(255,255,255,.12);opacity:.8;}
.alert{padding:11px 15px;border-radius:7px;font-size:12.5px;margin:8px 0;line-height:1.5;}
.alert-info{background:#e3f2fd;border-left:4px solid var(--blue);color:#0d47a1;}
.alert-warn{background:#fff3e0;border-left:4px solid var(--amber);color:#e65100;}
.alert-done{background:#e8f5e9;border-left:4px solid var(--green);color:#1b5e20;}
.alert-lock{background:#fce4ec;border-left:4px solid var(--red);color:#b71c1c;}
table.pt{width:100%;border-collapse:collapse;font-size:12.5px;}
table.pt th{background:var(--gray1);padding:8px 12px;font-weight:700;border:1px solid var(--gray3);width:130px;text-align:left;white-space:nowrap;vertical-align:middle;}
table.pt td{padding:8px 12px;border:1px solid var(--gray3);vertical-align:middle;}
table.pt input,table.pt textarea{width:100%;border:none;outline:none;font-size:12.5px;font-family:inherit;background:transparent;resize:none;}
table.pt input[readonly],table.pt textarea[readonly]{background:#f6f8fc;}
.checklist{display:flex;flex-direction:column;gap:6px;font-size:12px;padding:4px 0;}
.checklist label{display:flex;align-items:flex-start;gap:8px;cursor:pointer;line-height:1.5;padding:3px 0;}
.checklist label input[type=checkbox]{margin-top:3px;flex-shrink:0;width:14px;height:14px;}
.checklist label.ro{cursor:default;}
.sec-hdr{padding:8px 14px;font-size:12.5px;font-weight:700;color:#fff;border-radius:5px;margin:12px 0 6px;display:flex;align-items:center;justify-content:space-between;}
.sec-hdr.navy{background:var(--navy2);}
.sec-hdr.blue{background:var(--blue);}
.sec-hdr.blue2{background:var(--blue2);}
.sigrow{display:grid;grid-template-columns:1fr 2fr 1fr 1fr;gap:10px;margin-top:10px;padding:12px;background:var(--gray1);border-radius:8px;border:1px solid var(--gray2);overflow:visible;}
.si{display:flex;flex-direction:column;gap:4px;}
.si-lbl{font-size:10.5px;font-weight:700;color:var(--gray4);text-transform:uppercase;letter-spacing:.3px;}
.si input{border:1px solid var(--gray3);border-radius:6px;padding:6px 9px;font-size:12px;font-family:inherit;width:100%;transition:border-color .15s;}
.si input:focus{outline:none;border-color:var(--blue);}
.si input[readonly]{background:var(--gray1);color:var(--navy);font-weight:600;cursor:default;}
.sigpad{border:2px dashed var(--gray3);border-radius:7px;background:#fafbfd;position:relative;cursor:pointer;transition:border-color .15s,background .15s;}
.sigpad:hover:not(.ro){border-color:var(--blue);background:#f0f4ff;}
.sigpad.ro{cursor:default;border-style:solid;border-color:var(--gray3);background:var(--gray1);}
.sigpad canvas{display:block;border-radius:5px;}
.sighint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#bbb;pointer-events:none;gap:5px;}
.sig-clear{position:absolute;top:5px;right:5px;background:rgba(198,40,40,.85);color:#fff;border:none;border-radius:4px;padding:2px 7px;font-size:10px;cursor:pointer;z-index:10;}
.sig-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;align-items:center;justify-content:center;}
.sig-modal.show{display:flex;}
.sig-modal-box{background:#fff;border-radius:14px;padding:24px;width:min(540px,94vw);box-shadow:0 8px 40px rgba(0,0,0,.3);}
.sig-modal-title{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--navy);}
.sig-modal-cw{position:relative;border:2px dashed var(--gray3);border-radius:8px;background:#fafafa;height:210px;}
.sig-modal-cw canvas{width:100%;height:100%;border-radius:6px;display:block;}
.sig-modal-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:13px;color:#ccc;pointer-events:none;}
.sig-modal-btns{display:flex;gap:10px;margin-top:14px;}
.sig-modal-btns button{flex:1;padding:11px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.sig-btn-clear{background:var(--gray2);color:var(--gray7);}
.sig-btn-ok{background:var(--navy);color:#fff;}
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:2px solid var(--gray2);padding:14px 28px;display:flex;gap:12px;justify-content:flex-end;z-index:100;backdrop-filter:blur(6px);box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.btn-submit{background:linear-gradient(135deg,var(--navy),var(--blue));color:#fff;border:none;padding:13px 36px;border-radius:var(--radius);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;letter-spacing:.5px;box-shadow:0 4px 14px rgba(0,48,135,.3);transition:transform .15s,box-shadow .15s;}
.btn-submit:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(0,48,135,.4);}
.btn-submit:disabled{background:#bbb;cursor:not-allowed;box-shadow:none;transform:none;}
.btn-pdf-dl{background:linear-gradient(135deg,var(--red),#8b0000);color:#fff;border:none;padding:13px 24px;border-radius:var(--radius);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(198,40,40,.25);transition:transform .15s;}
.btn-pdf-dl:hover{transform:translateY(-1px);}
.done-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;text-align:center;gap:12px;}
.done-screen.show{display:flex;}
.done-icon{font-size:72px;}
.done-title{font-size:24px;font-weight:900;color:var(--navy);}
.done-sub{font-size:14px;color:var(--gray4);max-width:380px;line-height:1.6;white-space:pre-line;}
.loading{display:none;position:fixed;inset:0;background:rgba(255,255,255,.88);z-index:9998;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.loading.show{display:flex;}
.loading-spin{width:48px;height:48px;border:5px solid var(--gray2);border-top-color:var(--navy);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-msg{font-size:14px;font-weight:700;color:var(--navy);}
.ex-wrap{font-size:12px;color:#111;}
.ex-titlebar{display:flex;align-items:center;gap:10px;border:2px solid #c62828;padding:6px 12px;margin-bottom:10px;border-radius:3px;}
.ex-badge{background:#c62828;color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:2px;letter-spacing:.5px;}
.ex-title{font-size:16px;font-weight:900;letter-spacing:1px;}
.ex-sec{color:#fff;padding:6px 10px;font-weight:700;font-size:11.5px;margin:10px 0 3px;display:flex;align-items:center;justify-content:space-between;}
.ex-sec.blu{background:#1a5276;}
.ex-sec.green{background:#2e7d32;}
.ex-notice{background:#fef9e7;border:1px solid #f0c040;padding:7px 10px;font-size:11.5px;margin-bottom:8px;line-height:1.6;border-radius:3px;}
.ex-tbl{width:100%;border-collapse:collapse;font-size:11.5px;margin-bottom:3px;}
.ex-tbl th{background:#dce6f1;padding:5px 9px;border:1px solid #aab;font-weight:700;text-align:left;vertical-align:middle;}
.ex-tbl td{padding:5px 9px;border:1px solid #aab;vertical-align:top;line-height:1.5;}
.ex-subhdr{background:#dce6f1;padding:5px 8px;border:1px solid #aab;font-weight:700;font-size:11px;display:flex;align-items:center;justify-content:space-between;}
@media(max-width:700px){.sigrow{grid-template-columns:1fr 1fr;}.hdr-inner{padding:11px 16px;}.wrap{padding:0 12px;}.card-body{padding:14px 14px;}}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-inner">
    <div><div class="hdr-logo">BNCT</div><div class="hdr-sub">자산관리팀 안전서류 전자결재 시스템</div></div>
    <div class="hdr-badge" id="statusBadge">불러오는 중...</div>
  </div>
</header>
<div class="infobar" id="infoBar" style="display:none;">
  <span>공사명: <strong id="IP">-</strong></span>
  <span>업체명: <strong id="IC">-</strong></span>
  <span>작업인원: <strong id="IW">-</strong></span>
  <span>제출일시: <strong id="ID">-</strong></span>
</div>
<div class="stepwrap">
  <div class="stepbar" id="stepBar">
    <div class="step" id="step1"><div class="step-num">1</div><br>외주작업자<br>서류 제출</div>
    <div class="step" id="step2"><div class="step-num">2</div><br>업무담당자<br>Section 3 서명</div>
    <div class="step" id="step3"><div class="step-num">3</div><br>승인담당자<br>Section 4 서명</div>
    <div class="step" id="step4"><div class="step-num">4</div><br>작업 진행<br>최종 완료</div>
  </div>
</div>
<div class="wrap">
  <div id="formWrap"></div>
  <div class="done-screen" id="doneScreen">
    <div class="done-icon" id="doneIcon">✅</div>
    <div class="done-title" id="doneTitle">서명 완료</div>
    <div class="done-sub" id="doneSub">이 창을 닫아도 됩니다.</div>
  </div>
</div>
<div class="submit-bar" id="submitBar" style="display:none;">
  <button class="btn-pdf-dl" id="btnPdfDl" onclick="dlPDF()" style="display:none;">📄 PDF 저장</button>
  <button class="btn-submit" id="btnSubmit" onclick="doSign()">서명 저장 →</button>
</div>
<div class="sig-modal" id="sigModal">
  <div class="sig-modal-box">
    <div class="sig-modal-title">✍️ 서명하기</div>
    <div class="sig-modal-cw">
      <canvas id="bigCanvas" width="480" height="200"></canvas>
      <div class="sig-modal-hint" id="bigHint">손가락 또는 마우스로 서명하세요</div>
    </div>
    <div class="sig-modal-btns">
      <button class="sig-btn-clear" onclick="clearBigSig()">지우기</button>
      <button class="sig-btn-ok" onclick="saveBigSig()">확인</button>
    </div>
  </div>
</div>
<div class="loading" id="loadingEl">
  <div class="loading-spin"></div>
  <div class="loading-msg" id="loadingMsg">처리 중...</div>
</div>
<script>
'use strict';
const TOKEN=new URLSearchParams(location.search).get('token');
const ROLE=new URLSearchParams(location.search).get('role');
let PD=null;
const now=new Date(),p2=n=>String(n).padStart(2,'0');
const TODAY=now.getFullYear()+'-'+p2(now.getMonth()+1)+'-'+p2(now.getDate());
const NOWT=p2(now.getHours())+':'+p2(now.getMinutes());
let bigTargetId=null,bigCtx=null,bigDrawing=false,bigLx=0,bigLy=0;
const ld=(show,msg='처리 중...')=>{document.getElementById('loadingEl').classList.toggle('show',show);document.getElementById('loadingMsg').textContent=msg;};
const gv=id=>{const e=document.getElementById(id);return e?e.value:'';};
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const safeJSON=(s,def)=>{try{return JSON.parse(s||'');}catch{return def;}};
async function init(){
  if(!TOKEN){document.getElementById('formWrap').innerHTML='<div class="alert alert-lock">⚠️ 유효하지 않은 링크입니다.</div>';return;}
  ld(true,'서류 불러오는 중...');
  try{
    const res=await fetch('/api/get-permit?token='+TOKEN);
    const data=await res.json();
    ld(false);
    if(!res.ok||!data.permit){document.getElementById('formWrap').innerHTML='<div class="alert alert-lock">⚠️ '+(data.error||'서류를 찾을 수 없습니다.')+'</div>';return;}
    PD=data.permit;renderAll();
  }catch(e){ld(false);document.getElementById('formWrap').innerHTML='<div class="alert alert-lock">⚠️ 네트워크 오류: '+e.message+'</div>';}
}
function renderAll(){
  const p=PD,f=safeJSON(p.form_fields,{}),mgrs=safeJSON(p.managers,[]),forms=safeJSON(p.forms,[]);
  const mgr3=mgrs.map(m=>m.name).join(', '),status=p.status||'pending_s3';
  document.getElementById('IP').textContent=p.project_name||'-';
  document.getElementById('IC').textContent=p.company_name||'-';
  document.getElementById('IW').textContent=(p.worker_count||'-')+'명';
  document.getElementById('ID').textContent=p.submit_date||'-';
  document.getElementById('infoBar').style.display='flex';
  const BM={pending_s3:'⏳ Section 3 서명 대기',pending_s4:'⏳ Section 4 서명 대기',active:'✅ 승인 완료 · 작업 진행 중',completed:'🏁 모든 절차 완료'};
  const badge=document.getElementById('statusBadge');
  badge.textContent=BM[status]||status;
  if(status==='completed'||status==='active')badge.classList.add('done');
  const si={pending_s3:1,pending_s4:2,active:3,completed:3}[status]??3;
  ['step1','step2','step3','step4'].forEach((id,i)=>{
    document.getElementById(id).className='step'+(i<si?' done':i===si?' active':'');
  });
  const canS3=ROLE==='s3'&&status==='pending_s3';
  const canS4=ROLE==='s4'&&status==='pending_s4';
  const canActive=ROLE==='active'&&(status==='active'||status==='completed');
  if(ROLE&&!canS3&&!canS4&&!canActive){
    const lm={s3:'이미 서명이 완료되었거나 이전 단계가 처리되지 않았습니다.',s4:'Section 3 서명이 완료된 후 접근할 수 있습니다.',active:'Section 4 승인이 완료된 후 접근할 수 있습니다.'};
    document.getElementById('formWrap').innerHTML='<div class="alert alert-lock">🔒 '+lm[ROLE]+'</div>';
    document.getElementById('formWrap').innerHTML+=forms.filter(fm=>fm.type==='pledge').map(fm=>buildPledge(fm,f,p)).join('')+buildPermit(f,p,mgr3,'view',status,false)+forms.filter(fm=>['hotwork','height','electric','lifting'].includes(fm.type)).map(fm=>buildExtra(fm,f)).join('');
    setTimeout(()=>restoreSigs(p),60);return;
  }
  let html='';
  forms.filter(fm=>fm.type==='pledge').forEach(fm=>{html+=buildPledge(fm,f,p);});
  html+=buildPermit(f,p,mgr3,ROLE,status,canS3||canS4||canActive);
  forms.filter(fm=>['hotwork','height','electric','lifting'].includes(fm.type)).forEach(fm=>{html+=buildExtra(fm,f);});
  document.getElementById('formWrap').innerHTML=html;
  setTimeout(()=>{document.querySelectorAll('.sigpad:not(.ro) canvas').forEach(cv=>initPad(cv));restoreSigs(p);},60);
  const bar=document.getElementById('submitBar');
  if(canS3||canS4||canActive){
    bar.style.display='flex';
    document.getElementById('btnSubmit').textContent=canActive?'💾 저장하기':'✅ 서명 저장 →';
    if(canActive)document.getElementById('btnPdfDl').style.display='inline-block';
  }
}
function restoreSigs(p){
  const f=safeJSON(p.form_fields,{});
  if(f.sig2_img)drawSigImg('sig-s2',f.sig2_img);
  safeJSON(p.forms,[]).filter(fm=>fm.type==='pledge').forEach(fm=>{const k='sig_pledge_'+fm.worker;if(f[k])drawSigImg('sig-pledge-'+fm.worker,f[k]);});
  if(p.s3_sig)drawSigImg('sig-s3',p.s3_sig);
  if(p.s4_sig)drawSigImg('sig-s4',p.s4_sig);
  const s5=safeJSON(p.s5_to_s10,{});
  ['s8','s9','s10'].forEach(id=>{if(s5[id+'sig'])drawSigImg('sig-'+id,s5[id+'sig']);});
}
function drawSigImg(id,url){const cv=document.getElementById(id);if(!cv)return;const img=new Image();img.onload=()=>cv.getContext('2d').drawImage(img,0,0,cv.width,cv.height);img.src=url;}
</script>
<script>
// ── 안전서약서 빌더 ──
function buildPledge(fm,f,p){
  const wi=fm.worker||1;
  const items=['현장 출입 시 안전보호구(안전모, 안전조끼, 안전화 등)를 철저히 착용한다.','작업간에 핸드폰, 이어폰 등 기타 개인 전자제품 사용을 금지한다.','차량은 제한속도를 준수하고, 지정된 도로만을 주행한다. (야드 내 30km/h, 안벽 내 15km/h 이내)','중량물 및 작업 중인 컨테이너 아래 등 위험지역에 위치하지 않는다.','장비 주행로에는 주차 및 보행을 금지한다.','작업 전 안전 조회 및 제반 안전교육시에는 반드시 참석토록 한다.','운행 전 경고장치 이상유무 확인 및 경고등을 점등한다.','보행시는 보행자 통로를 사용하며 작업 중 또는 장비내에서 흡연하지 않는다.','운전중 안전벨트 착용 및 음주, 졸음 운전을 하지 않는다.','출입이 금지된 구역이나 본인의 작업 구역 이외에는 출입하지 않는다.','휴게시간에는 지정된 휴게장소에서 충분한 휴식을 취한다.','고소, 추락, 낙하물, 충돌 위험이 있는 장소에는 작업할 때 상급관리자의 허가 및 감독하에 작업을 안전하게 실시한다.','화기작업 전 작업역 내 관계자외 출입을 금지하고 표지판을 설치한다.','화기작업 중 용접불티등에 의한 화재가 발생하지 않도록 비산불티차단막 설치 및 소화기를 비치한다.','작업 전 및 완료 후 해당 담당자에게 연락을 취하여 완료 여부를 확인 받는다.','작업 중 특이사항 발생 시 즉각 해당 담당자에게 보고 및 안전조치 한다.'];
  const nm=esc(f['pledge_name_'+wi]||''),rk=esc(f['pledge_rank_'+wi]||''),ct=esc(f['pledge_contact_'+wi]||'');
  return `<div class="card"><div class="card-hdr pledge"><span>📋 안전서약서</span><span class="badge">작업자 ${wi} / ${esc(p.worker_count)}</span><span class="badge done-mark">외주작업자 작성완료</span></div><div class="card-body">
    <div style="text-align:center;font-size:20px;font-weight:900;letter-spacing:5px;padding:14px 0 12px;border-bottom:2px solid #000;margin-bottom:12px;">안 전 서 약 서</div>
    <p style="font-size:12px;line-height:1.9;margin-bottom:14px;">상기 본인은 BNCT 터미널에 근무함에 있어 본인과 동료 근로자의 생명과 건강 그리고 가정의 평화와 건강하고 안전한 터미널 조성을 위하여 아래 준수 사항을 철저히 이행하여 산업재해를 예방하는데 최선을 다할 것을 서약합니다.</p>
    <div style="text-align:center;font-weight:900;font-size:13px;padding:8px 0;border-top:2px solid #000;border-bottom:2px solid #000;letter-spacing:3px;margin-bottom:10px;">◈ 작업자 준수 사항 ◈</div>
    <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:10px;">
      ${items.map((t,i)=>`<tr><td style="border:1px solid #ccc;padding:5px 8px;text-align:center;width:28px;font-weight:700;background:#f5f5f5;">${i+1}</td><td style="border:1px solid #ccc;padding:5px 10px;line-height:1.5;">${t}</td></tr>`).join('')}
      <tr><td style="border:1px solid #ccc;padding:5px 8px;text-align:center;width:28px;font-weight:700;background:#fff3cd;">17</td><td style="border:1px solid #ccc;padding:5px 10px;line-height:1.5;background:#fff3cd;"><strong>안전조치 미비로 인하여 현장 관리감독자 및 안전담당자의 작업중단 및 개선요청 시 즉각 이행한다.</strong></td></tr>
      <tr><td style="border:1px solid #ccc;padding:5px 8px;text-align:center;width:28px;font-weight:700;background:#fff3cd;">18</td><td style="border:1px solid #ccc;padding:5px 10px;line-height:1.5;background:#fff3cd;"><strong>*무관용의 법칙* 안전수칙 위반 시 경고장 발부 및 터미널 출입금지 조치한다. (1회 적발시: 경고, 2회 적발시: 출입금지 3개월)</strong></td></tr>
    </table>
    <div style="font-size:12px;font-weight:700;text-align:center;padding:9px;border:1px solid #bbb;background:#fafafa;margin-bottom:12px;line-height:1.7;">상기 본인은 위 준수사항을 성실하게 이행하겠으며 본인의 과실로 인한 사고 발생 시<br>책임질것을 서약합니다. 안전을 최우선으로 생각하며 안전하게 작업하겠습니다.</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border:1px solid #bbb;font-size:12px;margin-bottom:10px;">
      <div style="padding:7px 10px;border-right:1px solid #bbb;"><div style="font-weight:700;font-size:11px;color:#555;margin-bottom:3px;">공사명</div><div>${esc(p.project_name||'')}</div></div>
      <div style="padding:7px 10px;border-right:1px solid #bbb;"><div style="font-weight:700;font-size:11px;color:#555;margin-bottom:3px;">소 속</div><div>${esc(p.company_name||'')}</div></div>
      <div style="padding:7px 10px;border-right:1px solid #bbb;"><div style="font-weight:700;font-size:11px;color:#555;margin-bottom:3px;">직 위</div><div>${rk}</div></div>
      <div style="padding:7px 10px;"><div style="font-weight:700;font-size:11px;color:#555;margin-bottom:3px;">연락처</div><div>${ct}</div></div>
    </div>
    <div style="display:flex;gap:12px;align-items:center;border:1px solid #bbb;padding:8px 12px;font-size:12px;">
      <div style="font-weight:700;">성 명:</div><div style="flex:1;font-size:13px;">${nm}</div>
      <div style="font-weight:700;">(인)</div>
      <div class="sigpad ro" style="width:150px;height:54px;"><canvas id="sig-pledge-${wi}" width="150" height="54"></canvas><div class="sighint">서명</div></div>
    </div>
  </div></div>`;
}

// ── 작업허가서 빌더 ──
function buildPermit(f,p,mgr3,role,status,canEdit){
  const i2=['본인은 위험성 평가를 비롯하여 본 작업 활동과 관련하여 필요한 관리 양식들을 검토하였다.','본인은, 조치가 적절히 이루어졌는지 확실히 하기 위해 관계자와 협의하였다.','본인은, 첨부된 위험성 평가 및 해당 관리 양식에 따라 본 작업 활동을 조정 및 관리할 능력이 있다.','본인은 작업자 및 작업에 영향을 받는 사람의 건강 및 안전을 확보하기 위해 필요한 모든 조치를 취할것이다.','본인은, 작업 수행자가 위험성 평가 및 각 관리 양식은 물론 아래 Section 5 의 지시사항에 대한 설명을 들었고 해당 내용들을 이해했음을 확인하여야 한다.','본인은, 작업 활동 전체에 걸쳐 위험요소를 관찰하고 관리하여야 한다.','본인은, 당 작업 허가 승인 담당자에게 본 허가서를 검토하고, 등록 및 번호를 부여하도록 요청하는 바이다.'];
  const i3=['본인은, 위험성 평가 및 필요한 관리 양식을 포함하여 관련된 모든 문서들의 내용을 검토하였으며 작업 업체/작업자에게 의견을 제시하였다.','본인은, 작업 업체/작업자를 담당하는 자로서, 작업 방식과 제안된 관리방안들이 시행되는 것을 모니터링하여 BNCT 터미널 안전 기준이 달성될 수 있도록 할 것이다.','본인은, 해당 작업 구역의 관련자에게 작업 시행 구간, 작업 업체/작업자가 완결해야 할 모든 작업 내역, 작업 관리감독 및 강화를 위해 수립된 절차들에 대한 정보를 알려주었다.'];
  const i4=['본인은, 위험성 평가를 비롯하여 필요한 관리 양식을 포함한 모든 관련 문서 내용을 검토하였다.','본인은 당 작업 허가서를 등록하고, 작업 번호를 부여하였으며, 관련된 모든 문서 상에 해당 작업 번호를 기입하였다.'];
  const s3Done=!!p.s3_signed_at,s4Done=!!p.s4_signed_at;
  const s5=safeJSON(p.s5_to_s10,{});
  const s2C=safeJSON(f.s2_checks,[]),s3C=safeJSON(p.s3_checks,[]),s4C=safeJSON(p.s4_checks,[]);
  const canS3=role==='s3'&&status==='pending_s3';
  const canS4=role==='s4'&&status==='pending_s4';
  const canActive=role==='active'&&(status==='active'||status==='completed');
  const cb=(c,d,l)=>c?`<span class="badge edit">✏ ${l} 필요</span>`:d?`<span class="badge done-mark">✅ 완료</span>`:`<span class="badge wait">대기중</span>`;
  const mkSig=(id,e)=>`<div class="sigrow" style="${e?'':'background:var(--gray1);'}">
    <div class="si"><div class="si-lbl">이름</div><input id="${id}n" value="${esc(s5[id+'n']||'')}" ${!e?'readonly':''} style="${!e?'background:var(--gray1);':''}"></div>
    <div class="si"><div class="si-lbl">서명</div><div class="sigpad${e?'':' ro'}" style="height:54px;" ${e?'onclick="openSig(this)"':''}>
      <canvas id="sig-${id}" width="260" height="54"></canvas>
      ${e?`<div class="sighint">🖊 클릭하여 서명</div><button class="sig-clear" onclick="clrSig(event,'sig-${id}')">지우기</button>`:'<div class="sighint">서명</div>'}
    </div></div>
    <div class="si"><div class="si-lbl">날짜</div><input id="${id}d" type="date" value="${esc(s5[id+'d']||'')}" ${!e?'readonly':''} style="${!e?'background:var(--gray1);':''}"></div>
    <div class="si"><div class="si-lbl">시간</div><input id="${id}t" type="time" value="${esc(s5[id+'t']||'')}" ${!e?'readonly':''} style="${!e?'background:var(--gray1);':''}"></div>
  </div>`;

  const p1=`<div class="card"><div class="card-hdr permit1"><span>📄 작업허가서 양식</span><span class="badge">Page 1 of 2</span></div><div class="card-body">
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px;"><div style="border:1.5px solid #999;display:flex;font-size:12px;border-radius:3px;overflow:hidden;"><div style="background:#003087;color:#fff;padding:4px 12px;font-weight:700;font-size:11px;">작업허가 번호</div><div style="padding:4px 16px;">${esc(f.permitNo||'')}</div></div></div>
    <div style="border:1px solid #ccc;padding:7px 12px;font-size:12px;margin-bottom:10px;background:#fafafa;border-radius:3px;">본 양식은 상세 명시된 <strong>고위험군 작업</strong>에 대한 승인 및 전달 사항 등을 관리하기 위한 것이다.</div>
    <div class="sec-hdr navy">Section 1: 일반 사항 <span class="badge done-mark" style="font-size:10px;">외주작업자 작성완료</span></div>
    <table class="pt" style="margin-bottom:10px;">
      <tr><th>작업명</th><td>${esc(f['s1-work']||'')}</td></tr>
      <tr><th>작업 장소</th><td>${esc(f['s1-place']||'')}</td></tr>
      <tr><th>작업 업체</th><td>${esc(f['s1-company']||p.company_name||'')}</td></tr>
      <tr><th>예상 작업 기간</th><td>${esc(f['s1-from']||'')} ~ ${esc(f['s1-to']||'')}</td></tr>
    </table>
    <div style="border:1px solid #ccc;padding:9px 12px;font-size:12px;margin-bottom:10px;border-radius:3px;">
      <div style="font-weight:700;margin-bottom:6px;">고위험군 작업 선택:</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 20px;">
        ${['화기 작업','토공/굴착 작업','밀폐공간출입작업','설비/장비 격리','고소 작업','기계적 인양 작업','고압 스위치 접근 및 시험 작업 허가','전기 유지보수작업'].map(t=>`<label style="display:flex;align-items:center;gap:5px;font-size:12px;"><input type="checkbox" disabled style="width:13px;height:13px;"> ${t}</label>`).join('')}
      </div>
    </div>
    <div class="sec-hdr navy">Section 2: 승인 요청 (작업 업체 관리 감독자 작성) <span class="badge done-mark" style="font-size:10px;">외주작업자 작성완료</span></div>
    <div class="checklist" style="margin-bottom:8px;">
      ${i2.map((t,i)=>`<label class="ro"><input type="checkbox"${s2C.includes(i)?' checked':''} disabled style="width:14px;height:14px;"> <span style="font-size:12px;">${t}</span></label>`).join('')}
    </div>
    <div class="sigrow" style="background:#f0f4f8;">
      <div class="si"><div class="si-lbl">이름</div><input value="${esc(f['s2-name']||'')}" readonly></div>
      <div class="si"><div class="si-lbl">서명</div><div class="sigpad ro" style="height:54px;"><canvas id="sig-s2" width="260" height="54"></canvas><div class="sighint">서명</div></div></div>
      <div class="si"><div class="si-lbl">날짜</div><input type="date" value="${esc(f['s2-date']||'')}" readonly></div>
      <div class="si"><div class="si-lbl">시간</div><input type="time" value="${esc(f['s2-time']||'')}" readonly></div>
    </div>
    <div class="sec-hdr blue" style="margin-top:14px;">Section 3: 작업업체 검토 (업무담당자 작성) ${cb(canS3,s3Done,'서명')}</div>
    ${!s3Done&&!canS3?'<div class="alert alert-warn">⏳ Section 3 서명 대기 중입니다.</div>':''}
    <div class="checklist" style="margin-bottom:8px;">
      ${i3.map((t,i)=>canS3?`<label><input type="checkbox" id="c3-${i}" style="width:14px;height:14px;"> <span style="font-size:12px;">${t}</span></label>`:`<label class="ro"><input type="checkbox"${s3C.includes(i)?' checked':''} disabled style="width:14px;height:14px;"> <span style="font-size:12px;">${t}</span></label>`).join('')}
    </div>
    <div class="sigrow">
      <div class="si"><div class="si-lbl">이름</div><input id="s3n" value="${esc(p.s3_name||mgr3)}" ${!canS3?'readonly':''} style="${!canS3?'background:var(--gray1);color:var(--navy);font-weight:700;':''}"></div>
      <div class="si"><div class="si-lbl">서명</div><div class="sigpad${canS3?'':' ro'}" style="height:54px;" ${canS3?'onclick="openSig(this)"':''}>
        <canvas id="sig-s3" width="260" height="54"></canvas>
        ${canS3?'<div class="sighint">🖊 클릭하여 서명</div><button class="sig-clear" onclick="clrSig(event,\'sig-s3\')">지우기</button>':'<div class="sighint">서명</div>'}
      </div></div>
      <div class="si"><div class="si-lbl">날짜</div><input id="s3d" type="date" value="${esc(p.s3_date||TODAY)}" ${!canS3?'readonly':''} style="${!canS3?'background:var(--gray1);':''}"></div>
      <div class="si"><div class="si-lbl">시간</div><input id="s3t" type="time" value="${esc(p.s3_time||NOWT)}" ${!canS3?'readonly':''} style="${!canS3?'background:var(--gray1);':''}"></div>
    </div>
    <div class="sec-hdr blue2" style="margin-top:14px;">Section 4: 승인 (작업허가 승인 담당자 작성) ${cb(canS4,s4Done,'서명')}</div>
    ${!s4Done&&!canS4?'<div class="alert alert-warn">⏳ Section 4 서명 대기 중입니다.</div>':''}
    <div class="checklist" style="margin-bottom:8px;">
      ${i4.map((t,i)=>canS4?`<label><input type="checkbox" id="c4-${i}" style="width:14px;height:14px;"> <span style="font-size:12px;">${t}</span></label>`:`<label class="ro"><input type="checkbox"${s4C.includes(i)?' checked':''} disabled style="width:14px;height:14px;"> <span style="font-size:12px;">${t}</span></label>`).join('')}
    </div>
    <div class="sigrow">
      <div class="si"><div class="si-lbl">이름</div><input id="s4n" value="${esc(p.s4_name||'이병문')}" ${!canS4?'readonly':''} style="${!canS4?'background:var(--gray1);color:var(--blue2);font-weight:700;':''}"></div>
      <div class="si"><div class="si-lbl">서명</div><div class="sigpad${canS4?'':' ro'}" style="height:54px;" ${canS4?'onclick="openSig(this)"':''}>
        <canvas id="sig-s4" width="260" height="54"></canvas>
        ${canS4?'<div class="sighint">🖊 클릭하여 서명</div><button class="sig-clear" onclick="clrSig(event,\'sig-s4\')">지우기</button>':'<div class="sighint">서명</div>'}
      </div></div>
      <div class="si"><div class="si-lbl">날짜</div><input id="s4d" type="date" value="${esc(p.s4_date||TODAY)}" ${!canS4?'readonly':''} style="${!canS4?'background:var(--gray1);':''}"></div>
      <div class="si"><div class="si-lbl">시간</div><input id="s4t" type="time" value="${esc(p.s4_time||NOWT)}" ${!canS4?'readonly':''} style="${!canS4?'background:var(--gray1);':''}"></div>
    </div>
    <div style="border:1px solid #ccc;border-top:none;padding:8px 12px;font-size:12px;border-radius:0 0 4px 4px;">
      <strong>제한 사항:</strong> 본 작업 승인 사항은 아래 명시된 일시까지만 유효하다.
      <div style="display:flex;gap:12px;margin-top:5px;flex-wrap:wrap;">
        날짜: <input id="s4ld" type="date" value="${esc(p.s4_limit_date||'')}" ${!canS4&&!canActive?'readonly':''} style="border:none;border-bottom:1px solid #ccc;outline:none;font-size:12px;font-family:inherit;">
        시간: <input id="s4lt" type="time" value="${esc(p.s4_limit_time||'')}" ${!canS4&&!canActive?'readonly':''} style="border:none;border-bottom:1px solid #ccc;outline:none;font-size:12px;font-family:inherit;">
      </div>
    </div>
  </div></div>`;

  const si5=['본인의 역할 및 업무, 작업 범위에 대해 숙지하여야 한다.','위험성 평가 및 관리 양식을 읽고, 설명을 들었으며, 이를 이해하고 있어야 한다.','각 조 작업을 시작할 때마다 현장 감독자에게 알려야 하며, 작업허가/출입 관련 지시 및 허가를 받아 작업을 시작하도록 한다.','교대 근무를 할 경우, 작업 시작 전/종료 후 서명한다. (Section 7 참고)','작업 하는 동안 새로운 위험요소가 발견되었다면, 즉시 해당 작업 업체/작업자들의 현장 감독자와 기타 작업과 연관된 당사자들에게 통보한다.'];
  const p2=`<div class="card"><div class="card-hdr permit2"><span>📄 작업허가서 양식 (계속)</span><span class="badge">Page 2 of 2</span>${canActive?'<span class="badge edit">✏ 작성 가능</span>':''}</div><div class="card-body">

    </div>

      <tr><th>작업시작 전 논의사항</th><td><textarea id="s6a" rows="2" style="width:100%;border:none;outline:none;font-size:12px;font-family:inherit;resize:none;" ${!canActive?'readonly':''}>${esc(s5.s6a||'')}</textarea></td></tr>

      <tr><th>변화/변경사항</th><td><textarea id="s6e" rows="2" style="width:100%;border:none;outline:none;font-size:12px;font-family:inherit;resize:none;" ${!canActive?'readonly':''}>${esc(s5.s6e||'')}</textarea></td></tr>
    </table>
    <div class="sec-hdr blue2" style="margin-top:10px;">Section 7: 허가 기간 연장 ${canActive?'<span class="badge edit">✏</span>':''}</div>

    <div class="sec-hdr blue2" style="margin-top:10px;">Section 8: 작업 철수 ${canActive?'<span class="badge edit">✏</span>':''}</div>
    <p style="font-size:12px;margin-bottom:6px;">해당 작업이 완결되어, 이를 모든 작업자에게 설명하였으며, 작업 현장은 안전하게 정돈되었다.</p>
    ${mkSig('s8',canActive)}
    <div class="sec-hdr blue2" style="margin-top:10px;">Section 9: 작업 종료 관련 ${canActive?'<span class="badge edit">✏</span>':''}</div>
    <p style="font-size:12px;margin-bottom:6px;">본 작업 활동이 완결되어, 모든 작업자에게 설명하였으며, 작업 현장은 안전하게 정돈되었다.</p>

    <div class="sec-hdr blue2" style="margin-top:10px;">Section 10: 작업 완료 허가 ${canActive?'<span class="badge edit">✏</span>':''}</div>
    <p style="font-size:12px;margin-bottom:6px;">본 작업허가서와 연관된 모든 작업이 종결되었으며, 해당 문서들을 수령하였다.</p>
    ${mkSig('s10',canActive)}

  return p1+p2;
}

<script>
// ── 추가양식 빌더 ──
function buildExtra(fm,f){

  const ynT=(items,prefix,hasTxt=false)=>{
    const hdr=hasTxt?`<thead><tr><th>항목</th><th style="width:36px;text-align:center;">예</th><th style="width:44px;text-align:center;">아니오</th><th>비고</th></tr></thead>`:`<thead><tr><th>항목</th><th style="width:36px;text-align:center;">예</th><th style="width:44px;text-align:center;">아니오</th></tr></thead>`;
    return `<table class="ex-tbl">${hdr}<tbody>${items.map((t,i)=>`<tr><td style="font-size:11px;line-height:1.5;">${t}</td><td style="text-align:center;">${roCk(prefix+'_y'+i)}</td><td style="text-align:center;">${roCk(prefix+'_n'+i)}</td>${hasTxt?`<td style="font-size:11px;">${fv(prefix+'_txt'+i)}</td>`:''}</tr>`).join('')}</tbody></table>`;
  };
  const titles={hotwork:'화기작업 양식',height:'고소작업 양식',electric:'전기 유지보수 작업 양식(전원이 켜진 장비)',lifting:'기계적 인양 작업 양식'};
  let inner='';

  if(fm.type==='hotwork'){
    const s2=['소화기는 화기 작업 지점 10m 이내에 비치한다.','작은 불티, 슬래그를 차단하기 위해 용접방화포나 불티 방지막을 바닥이나 철망판 위에 설치한다.','가연성 물질 또는 연료원은 작업장소로부터 격리시킬 것 (작업장소 표면, 위, 아래 포함 주변 15m 정도의 공간을 고려할 것)','배수관, 전선 및 가연성 물질은 덮어둔다. (작업장소 표면, 위, 아래 포함 주변 15m 정도의 공간을 고려해 방화 담요, 불티 방지막 등을 이용한다.)','소방호스를 작업지점까지 끌어다두고 사용할 준비를 해둔다 (야외작업의 경우에 적합하며 전기 장비가 없는 곳)','화재 감시자는 작업 중 또는/그리고 작업 완료 후에 작업 구역을 주시한다 (화재 위험, 불티, 슬래그, 뜨거운 물체가 있는지 살펴보기)'];
    const s3=['설비에 인접하여 화기작업이 이루어지는 경우 격리 필요 (파이프, 탱크, 압력 용기 등)','작업 개시 전 화재방지 또는 화재탐지 시스템 격리 필요 (장기간 격리의 경우 보험사에 통지 고려)','작업 공간 세척, 불순물 제거, 환기 또는 작업전 가스 농도 측정 필요 (작업장 주변의 인화성/폭발성 기체, 먼지, 액체 또는 고체 잔여물 때문)','작업 개시 전 작업장소 준비 (청소, 코팅제거) 또는 작업 중 대기 모니터링 필요 (표면이 절단되거나 가열될 때 표면/코팅에서 유해한 물질이 배출될 경우)','작업 특성상 방독마스크 착용 필요','작업 특성상 가스 호스 또는 기타 민감한 시설/장비의 보호 조치 필요','아크 용접시, 작업 장소로 인한 감전 가능성을 최소화하기 위해 조치가 필요한 경우 (물, 습기로 인한 경우, 주위 온도가 32도 이상인 경우, 등)'];
    const s4=['장비는 밀폐 공간 밖에 설치(용접에 필요한 실린더, 호스 등) (단, 방독 마스크 제외)','환기장치를 사용할 경우, 환기장치의 후드를 오염원에 근접시킬 것','오염원을 밀폐공간에서 제거하여 오염원이 재순환하거나 다른 근로자들에게 해를 끼치지 못하게 할 것','아크 용접 작업이 장시간 중단될 경우, 전원을 끄고 호스 연결을 해체하고 가스 압력을 낮출 것','가스 용접/절단 작업이 장시간 중단될 경우, 토치와 실린더 밸브를 잠그고 토치와 호스 연결을 해체하고 가스 압력을 낮출 것'];
    inner=secB('Section 1 – 일반사항')
     +`<table class="ex-tbl"><tbody><tr><th style="width:120px;">작업명<br><small style="font-weight:400;">(작업 위험성 평가에 따름)</small></th><td colspan="3">${fv('s1_work')}</td></tr><tr><th>작업 장소</th><td colspan="3">${fv('s1_place')}</td></tr><tr><th>접근 제한</th><td colspan="3">${fv('s1_restrict')}</td></tr><tr><th>잠재적 발화원</th><td colspan="3"><div style="display:flex;flex-wrap:wrap;gap:12px;font-size:11.5px;"><label style="display:flex;gap:4px;align-items:center;">${roCk('src_spark')} 불꽃 (용접, 납땜 등)</label><label style="display:flex;gap:4px;align-items:center;">${roCk('src_slag')} 불티 또는 슬래그 (연마, 절단, 마찰교반용접 도구, 용접 등)</label><label style="display:flex;gap:4px;align-items:center;">${roCk('src_hot')} 뜨거운 물체 (금속 표면, 철판 등)</label><label style="display:flex;gap:4px;align-items:center;">${roCk('src_etc_chk')} 기타: ${fv('src_etc_txt')}</label></div></td></tr></tbody></table>`
     +secB('Section 2 – 일반 화기작업 /발화요인 통제')
     +`<div style="font-size:10.5px;padding:3px 8px;border:1px solid #aab;border-top:none;background:#fffbe6;margin-bottom:3px;">일반 화기 작업 및 발화 통제가 필요한 경우: YES 또는 N/A(해당사항없음)으로 표기</div>`
     +ynT(s2,'s2',true)
     +secB('Section 3 – 특정 화기작업 /발화요인 통제')+ynT(s3,'s3',true)
     +`<div class="ex-sec blu" style="display:flex;justify-content:space-between;align-items:center;"><span>Section 4 – 추가 조치 (밀폐 공간의 경우)</span><label style="font-weight:400;font-size:10.5px;display:flex;align-items:center;gap:4px;">${roCk('s4_na')} 아니오 (해당사항없을경우)</label></div>`
     +ynT(s4,'s4',false);

  }else if(fm.type==='height'){
    const aerial=['작업자의 머리 위쪽에 위치한 전선, 구조물, 움직이는 장비 등의 위험요소로부터 최소 안전거리를 유지해야 한다','고소작업차를 평평한 곳에 설치하기 위해 특정 조치가 필요하다','(사람이나 장비 접근을 방지하기 위해) 고소작업차 주위에 바리케이트 또는 표지판을 설치해야한다.','붐 길이가 11m 이상이어서 면허증을 가진 고소작업차 기사가 필요하다.','고소작업차를 사용하는 작업자는 고소작업차 설치, 통제 및 비상 탈출에 대해 숙지하고 있다.','기타:'];
    const scT=['시스템 비계 (설계가 규격화되어 있으며 일반적인 구조)','이동식 비계 (이동가능한 비계)','강관 비계(강관의 길이 및 클램프 종류, 비계 구조 다양함)','복잡한 구조의 비계 (캔틸레버, 걸침비계 등 복잡한 구조)'];
    const scA=['비계는 자격증이 있는 작업자가 설치하고 해체한다 (작업발판 높이 4m 이상인 경우 의무사항)','비계 설치 계획을 작성한다.','비계 설치 및 해체 시 낙하 사고 예방을 위해 주변에 바리케이트를 설치한다.','비계 절차는 안전한 비계 접근 상황을 확인하기 위해 사용된다.','비계 설치 및 해체 작업자의 안전을 위해 아래 사항을 적용한다.'];
    const rT=['발판 가장자리 주위 또는 지붕 가장자리에 고정형 안전난간(핸드레일/가드레일)','개구부 주위 이동형 안전난간 설치','개구부에 개폐형 덮개 설치 (사람이 올라가거나 사물 적재 시)'];
    const rA=['개폐형 덮개를 고정시키고 개구부 주의 안내를 위해 별도 조치 필요','추락 위험이 없는 안전한 장소에서 안전난간을 설치하기 위해 별도 조치 필요','안전난간 설치의 특성상 반드시 자격증을 소지한 비계 기능사가 임시 안전난간을 설치해야한다.'];
    const fT=['추락 억제 시스템 - (그네식 안전대 사용, 적절한 고정/부착 설비, 작업자 지면 접촉 방지를 위한 죔줄)','추락 저지 시스템 – (하네스, 로프, 충격흡수 장치, 앵커 사용)'];
    const drop=['접근 통제를 위한 임시 네트 설치','고소작업을 위한 자동죔줄(안전블록)','낙하물 방지망','지붕이나 설비의 날카로운 가장자리를 덮는 커버','머리 보호대','통제 구역 접근 허가/승인','경고 사인/바리케이트 필요','특정 조명 필요','기타:'];
    inner=secB('Section 1 – 고소작업 / 접근 방법')

     +secB('Section 2 – 고소작업 및 접근 허가 관련 요구사항')
     +`<div style="font-size:10.5px;padding:3px 8px;border:1px solid #aab;border-top:none;background:#f5f5f5;margin-bottom:3px;">필요한 조치 사항에 표시할 것</div>`
     +subH('고소작업차 관련 요구사항','aerial_na')
     +`<table class="ex-tbl"><thead><tr><th>고소작업차 관련 조치</th><th style="width:36px;text-align:center;">예</th><th style="width:44px;text-align:center;">아니오</th><th>'예'에 표시한 경우, 상세 조치 내용</th></tr></thead><tbody>${aerial.map((t,i)=>`<tr><td style="font-size:11px;line-height:1.5;">${t}</td><td style="text-align:center;">${roCk('aerial_y'+i)}</td><td style="text-align:center;">${roCk('aerial_n'+i)}</td><td style="font-size:11px;">${fv('aerial_txt'+i)}</td></tr>`).join('')}</tbody></table>`

     +`<div style="border:1px solid #aab;padding:8px 12px;margin-bottom:4px;border-radius:0 0 3px 3px;">${[['작업장에 위험요소가 없는가?','haz'],['추가 격리가 필요한가?','iso'],['비상 대응 방안이 필요한가?','emer']].map(q=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid #eee;font-size:11.5px;"><span>${q[0]}</span><span style="display:flex;gap:16px;"><label style="display:flex;gap:3px;align-items:center;">${roCk(q[1]+'_y')} 예</label><label style="display:flex;gap:3px;align-items:center;">${roCk(q[1]+'_n')} 아니오</label></span></div>`).join('')}<div style="margin-top:8px;font-size:11.5px;font-weight:700;">작업업체 관리감독자 위험 수용:</div><div style="font-size:11px;line-height:1.6;margin-top:3px;">본인은 20톤 이상의 인양작업을 허가한다. 본인은 이 작업을 수행하는데 있어 보다 안전한 대체 방법이 없음을 위험성평가 또는 작업안전분석을 통해 입증했다고 인정한다.</div><div style="display:flex;gap:16px;margin-top:6px;font-size:11.5px;"><strong>이름:</strong> ${fv('s2_name')}&ensp;<strong>날짜:</strong> ${fv('s2_date')}</div></div>`
     +secB('SECTION 3 – 작업 허가')
     +`<div style="border:1px solid #aab;padding:8px 12px;margin-bottom:4px;font-size:11.5px;border-radius:0 0 3px 3px;"><p style="line-height:1.6;margin-bottom:6px;">본 허가서를 인정하며 상기 명시된 조건 및 관련 절차를 준수할 것에 동의하고, 작업의 직접적인 담당자로서 책임을 수락한다. 아울러, 본인은 첨부된 위험성평가/작업안전분석, 절차서 그리고 구조방안을 숙지하였고 위험요인에 대한 개선 조치가 취해졌음을 확인하였다.</p><div style="display:flex;gap:16px;margin-bottom:8px;"><strong>이름:</strong> ${fv('s3_name1')}&ensp;<strong>날짜:</strong> ${fv('s3_date1')}</div><p style="line-height:1.6;margin-bottom:6px;">본인은 본 허가서에 나와있는 위험성평가/작업분석상의 작업조건과 주의 사항에 준하여 20톤 이상의 화물 인양 작업을 허가한다.<br><strong>주의:</strong> 본 허가서에 위험성평가/작업안전분석서를 반드시 첨부할 것.</p><div style="display:flex;gap:16px;"><strong>이름:</strong> ${fv('s3_name2')}&ensp;<strong>날짜:</strong> ${fv('s3_date2')}</div></div>`
     +secB('SECTION 4 – 작업의 완료, 중단 또는 취소 (작업업체 관리감독자)')
     +`<div style="border:1px solid #aab;padding:8px 12px;margin-bottom:6px;font-size:11.5px;border-radius:0 0 3px 3px;"><div style="display:flex;justify-content:space-between;margin-bottom:5px;"><span>인양허가와 관련된 모든 작업의 상태:</span><span>${roCk('s4_done')} 완료&emsp;${roCk('s4_stop')} 중단</span></div><div style="display:flex;justify-content:space-between;margin-bottom:4px;"><span>작업 완료 후 작업장과 그 인접한 구역을 점검하였으며 모든 위험요소에 대해 조치하였는가?</span><span>${roCk('s4_chk_y')} 예&nbsp;${roCk('s4_chk_n')} 아니오</span></div><div style="display:flex;justify-content:space-between;margin-bottom:6px;"><span>장비 점검 후 반납하였는가?</span><span>${roCk('s4_eq_y')} 예&nbsp;${roCk('s4_eq_n')} 아니오</span></div><div style="margin-bottom:6px;">비고: ${fv('s4_note')}</div><div style="display:flex;gap:16px;"><strong>이름:</strong> ${fv('s4_name')}&ensp;<strong>날짜:</strong> ${fv('s4_date')}&ensp;<strong>시간:</strong> ${fv('s4_time')}</div></div>`
     +secB('SECTION 5 – 체크리스트')
     +mkT('1. 일반',c1,'c51')+mkT('2. 화물',c2,'c52')+mkT('3. 인양장비',c3,'c53')+mkT('4. 크레인',c4,'c54')+mkT('5. 인양',c5,'c55')+mkT('6. 작업자',c6,'c56');
  }
  return `<div class="card"><div class="card-hdr extra"><span>📋 ${titles[fm.type]||fm.type}</span><span class="badge done-mark">외주작업자 작성완료</span></div><div class="card-body ex-wrap"><div class="ex-titlebar"><div class="ex-badge">작업허가서</div><div class="ex-title">${titles[fm.type]||fm.type}</div></div>${inner}</div></div>`;
}

// ── 서명 패드 ──
function initPad(cv){
  const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);
  ctx.strokeStyle='#111';ctx.lineWidth=2;ctx.lineCap='round';ctx.lineJoin='round';
  let dr=false,lx=0,ly=0;
  const gp=e=>{const r=cv.getBoundingClientRect(),sx=cv.width/r.width,sy=cv.height/r.height;if(e.touches)return{x:(e.touches[0].clientX-r.left)*sx,y:(e.touches[0].clientY-r.top)*sy};return{x:(e.clientX-r.left)*sx,y:(e.clientY-r.top)*sy};};
  const hh=()=>{const h=cv.closest('.sigpad')?.querySelector('.sighint');if(h)h.style.display='none';};
  cv.addEventListener('mousedown',e=>{dr=true;const p=gp(e);lx=p.x;ly=p.y;});
  cv.addEventListener('mousemove',e=>{if(!dr)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;hh();});
  cv.addEventListener('mouseup',()=>dr=false);cv.addEventListener('mouseleave',()=>dr=false);
  cv.addEventListener('touchstart',e=>{e.preventDefault();dr=true;const p=gp(e);lx=p.x;ly=p.y;},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();if(!dr)return;const p=gp(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;hh();},{passive:false});
  cv.addEventListener('touchend',()=>dr=false);
}
function clrSig(e,id){e.stopPropagation();const cv=document.getElementById(id);if(!cv)return;const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,cv.width,cv.height);const h=cv.closest('.sigpad')?.querySelector('.sighint');if(h)h.style.display='flex';}
function openSig(padEl){
  const cv=padEl.querySelector('canvas');if(!cv||padEl.classList.contains('ro'))return;
  bigTargetId=cv.id;document.getElementById('sigModal').classList.add('show');
  const bc=document.getElementById('bigCanvas');bigCtx=bc.getContext('2d');
  bigCtx.fillStyle='#fff';bigCtx.fillRect(0,0,bc.width,bc.height);
  bigCtx.strokeStyle='#111';bigCtx.lineWidth=3;bigCtx.lineCap='round';bigCtx.lineJoin='round';
  bigDrawing=false;document.getElementById('bigHint').style.display='flex';
  const gp=e=>{const r=bc.getBoundingClientRect();if(e.touches)return{x:e.touches[0].clientX-r.left,y:e.touches[0].clientY-r.top};return{x:e.clientX-r.left,y:e.clientY-r.top};};
  bc.onmousedown=e=>{bigDrawing=true;const p=gp(e);bigLx=p.x;bigLy=p.y;document.getElementById('bigHint').style.display='none';};
  bc.onmousemove=e=>{if(!bigDrawing)return;const p=gp(e);bigCtx.beginPath();bigCtx.moveTo(bigLx,bigLy);bigCtx.lineTo(p.x,p.y);bigCtx.stroke();bigLx=p.x;bigLy=p.y;};
  bc.onmouseup=()=>bigDrawing=false;
  bc.ontouchstart=e=>{e.preventDefault();bigDrawing=true;const p=gp(e);bigLx=p.x;bigLy=p.y;document.getElementById('bigHint').style.display='none';};
  bc.ontouchmove=e=>{e.preventDefault();if(!bigDrawing)return;const p=gp(e);bigCtx.beginPath();bigCtx.moveTo(bigLx,bigLy);bigCtx.lineTo(p.x,p.y);bigCtx.stroke();bigLx=p.x;bigLy=p.y;};
  bc.ontouchend=()=>bigDrawing=false;
}
function clearBigSig(){const c=document.getElementById('bigCanvas');bigCtx.fillStyle='#fff';bigCtx.fillRect(0,0,c.width,c.height);document.getElementById('bigHint').style.display='flex';}
function saveBigSig(){if(!bigTargetId)return;const bc=document.getElementById('bigCanvas'),tc=document.getElementById(bigTargetId);if(tc)tc.getContext('2d').drawImage(bc,0,0,tc.width,tc.height);const h=tc?.closest('.sigpad')?.querySelector('.sighint');if(h)h.style.display='none';document.getElementById('sigModal').classList.remove('show');}
function getSigData(id){const cv=document.getElementById(id);if(!cv)return null;const d=cv.getContext('2d').getImageData(0,0,cv.width,cv.height).data;for(let i=0;i<d.length;i+=4){if(d[i]<200||d[i+1]<200||d[i+2]<200)return cv.toDataURL('image/jpeg',.88);}return null;}

// ── 서명 제출 ──
async function doSign(){
  document.getElementById('btnSubmit').disabled=true;ld(true,'서명 저장 중...');
  try{
    const payload={token:TOKEN,step:ROLE};
    if(ROLE==='s3'){
      const sig=getSigData('sig-s3');
      if(!sig){ld(false);alert('Section 3 서명을 완료해주세요.');document.getElementById('btnSubmit').disabled=false;return;}
      const checks=[0,1,2].filter(i=>document.getElementById('c3-'+i)?.checked);
      payload.data={name:gv('s3n'),sig,date:gv('s3d'),time:gv('s3t'),checks};
      ld(true,'PDF 생성 중...');try{await generatePDF();}catch(e){console.warn('PDF:',e);}
    }else if(ROLE==='s4'){
      const sig=getSigData('sig-s4');
      if(!sig){ld(false);alert('Section 4 서명을 완료해주세요.');document.getElementById('btnSubmit').disabled=false;return;}
      const checks=[0,1].filter(i=>document.getElementById('c4-'+i)?.checked);
      payload.data={name:gv('s4n'),sig,date:gv('s4d'),time:gv('s4t'),checks,limitDate:gv('s4ld'),limitTime:gv('s4lt')};
    }else if(ROLE==='active'){
      payload.step='s5to10';
      payload.data={s6a:gv('s6a'),s6b:gv('s6b'),s6c:gv('s6c'),s6d:gv('s6d'),s6e:gv('s6e'),s7f:gv('s7f'),s7t:gv('s7t'),s8n:gv('s8n'),s8sig:getSigData('sig-s8'),s8d:gv('s8d'),s8t:gv('s8t'),s9n:gv('s9n'),s9sig:getSigData('sig-s9'),s9d:gv('s9d'),s9t:gv('s9t'),s10n:gv('s10n'),s10sig:getSigData('sig-s10'),s10d:gv('s10d'),s10t:gv('s10t')};
      ld(true,'PDF 생성 중...');try{await generatePDF();}catch(e){console.warn('PDF:',e);}
    }
    const res=await fetch('/api/sign-permit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    const data=await res.json();ld(false);
    if(!res.ok){alert('오류: '+(data.error||'저장 실패'));document.getElementById('btnSubmit').disabled=false;return;}
    document.getElementById('submitBar').style.display='none';
    document.getElementById('formWrap').style.display='none';
    document.getElementById('stepBar')?.closest('.stepwrap')?.remove();
    document.getElementById('doneScreen').classList.add('show');
    const msgs={s3:{icon:'✅',title:'Section 3 서명 완료!',sub:'승인 담당자(이병문)에게 이메일이 발송되었습니다.\n이 창을 닫아도 됩니다.'},s4:{icon:'🏆',title:'Section 4 승인 완료!',sub:'담당자에게 완료 이메일이 발송되었습니다.\n이 창을 닫아도 됩니다.'},active:{icon:'📄',title:'저장 완료!',sub:'PDF가 자동으로 다운로드되었습니다.\n이 창을 닫아도 됩니다.'}};
    const m=msgs[ROLE]||msgs.active;
    document.getElementById('doneIcon').textContent=m.icon;document.getElementById('doneTitle').textContent=m.title;document.getElementById('doneSub').textContent=m.sub;
  }catch(e){ld(false);alert('오류: '+e.message);document.getElementById('btnSubmit').disabled=false;}
}

// ── PDF 생성 ──
async function generatePDF(){
  const{jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const cards=Array.from(document.querySelectorAll('#formWrap .card'));
  if(!cards.length)throw new Error('서류 없음');
  const d=new Date(),pad=n=>String(n).padStart(2,'0');
  const fn=`안전서류_${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}.pdf`;
  const MARGIN=6,PRINTW=210-MARGIN*2,CAPW=760;
  for(let i=0;i<cards.length;i++){
    const card=cards[i],orig=card.getAttribute('style')||'';
    card.style.cssText=`width:${CAPW}px!important;max-width:${CAPW}px!important;border-radius:0!important;margin:0!important;box-shadow:none!important;background:white!important;overflow:visible!important;`;
    await new Promise(r=>setTimeout(r,80));
    const canvas=await html2canvas(card,{scale:2.2,useCORS:true,allowTaint:true,logging:false,backgroundColor:'#ffffff',width:CAPW,windowWidth:CAPW,
      onclone(doc){
        doc.querySelectorAll('input[type=text],input[type=date],input[type=time]').forEach(inp=>{const s=doc.createElement('span');s.textContent=inp.value||'';s.style.cssText='font-size:11.5px;display:inline-block;width:100%;word-break:break-all;font-family:inherit;';inp.parentNode.replaceChild(s,inp);});
        doc.querySelectorAll('textarea').forEach(ta=>{const s=doc.createElement('span');s.textContent=ta.value||'';s.style.cssText='font-size:11.5px;display:block;width:100%;white-space:pre-wrap;font-family:inherit;';ta.parentNode.replaceChild(s,ta);});
        doc.querySelectorAll('input[type=checkbox]').forEach(cb=>{const s=doc.createElement('span');s.textContent=cb.checked?'☑':'☐';s.style.cssText='font-size:13px;line-height:1;vertical-align:middle;';cb.parentNode.replaceChild(s,cb);});
        doc.querySelectorAll('*').forEach(el=>{el.style.overflow='visible';});
        doc.querySelectorAll('.sig-clear,.sighint,.submit-bar,.hdr,.stepwrap,.badge.edit').forEach(el=>{el.style.display='none';});
      }
    });
    card.setAttribute('style',orig);
    const imgData=canvas.toDataURL('image/jpeg',.96),imgH=(canvas.height/canvas.width)*PRINTW;
    if(i>0)pdf.addPage();
    if(imgH<=297-MARGIN*2){pdf.addImage(imgData,'JPEG',MARGIN,MARGIN,PRINTW,imgH);}
    else{
      const pageH=297-MARGIN*2,slicePx=Math.floor(pageH/imgH*canvas.height);
      let offset=0,pn=0;
      while(offset<canvas.height){
        const h=Math.min(slicePx,canvas.height-offset);
        const tc=document.createElement('canvas');tc.width=canvas.width;tc.height=h;
        const tx=tc.getContext('2d');tx.fillStyle='#fff';tx.fillRect(0,0,tc.width,h);tx.drawImage(canvas,0,offset,canvas.width,h,0,0,canvas.width,h);
        if(pn>0||i>0)pdf.addPage();
        pdf.addImage(tc.toDataURL('image/jpeg',.96),'JPEG',MARGIN,MARGIN,PRINTW,(h/canvas.width)*PRINTW);
        offset+=slicePx;pn++;
      }
    }
  }
  pdf.save(fn);
}
async function dlPDF(){document.getElementById('btnPdfDl').disabled=true;ld(true,'PDF 생성 중...');try{await generatePDF();}catch(e){alert('PDF 생성 실패: '+e.message);}finally{ld(false);document.getElementById('btnPdfDl').disabled=false;}}

init();
</script>
